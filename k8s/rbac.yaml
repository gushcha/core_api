apiVersion: v1
kind: ServiceAccount
metadata:
  name: deployer
  namespace: core-api
---
apiVersion: v1
kind: Secret
metadata:
  name: deploy-token
  namespace: core-api
  annotations:
    kubernetes.io/service-account.name: deployer
type: kubernetes.io/service-account-token
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: deployer
  namespace: core-api
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "create", "update", "patch"]
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: deployer
  namespace: core-api
subjects:
  - kind: ServiceAccount
    name: deployer
    namespace: core-api
roleRef:
  kind: Role
  name: deployer
  apiGroup: rbac.authorization.k8s.io
