apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: core-api
  namespace: core-api
  annotations:
    traefik.ingress.kubernetes.io/router.middlewares: core-api-strip-core-api-prefix@kubernetescrd
spec:
  ingressClassName: traefik
  rules:
    - http:
        paths:
          - path: /core-api
            pathType: Prefix
            backend:
              service:
                name: core-api
                port:
                  number: 3000
